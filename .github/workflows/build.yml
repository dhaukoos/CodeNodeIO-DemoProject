name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DemoProject
        uses: actions/checkout@v4

      - name: Checkout CodeNodeIO (for composite build)
        uses: actions/checkout@v4
        with:
          repository: dhaukoos/CodeNodeIO
          path: ../CodeNodeIO

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JVM targets
        run: ./gradlew jvmJar

      - name: Run JVM tests
        run: ./gradlew jvmTest
